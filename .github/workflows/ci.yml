name: Build and Deploy to Local K8s
on:
  workflow_dispatch: # Allows manual triggering from GitHub U
    inputs:
      environment:
        description: 'Deployment environment (e.g., local, staging, production)'
        required: true
        default: 'local'
jobs:
  build-and-push:
    runs-on: ubuntu-latest # Build happens in GitHub's cloud
    outputs:
      tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/dotnetplayground:${{ steps.vars.outputs.sha_short }}

  update-maniifest:
    needs: build-and-push
    runs-on: ubuntu-latest # This targets your laptop
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update image tag
        run: |
          sed -i "s|image: stalker007/dotnetplayground:.*|image: stalker007/dotnetplayground:${{ needs.build-and-push.outputs.tag }}|g" k8s/deployment.yaml

      - name: Commit manifest changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add k8s/deployment.yaml
          git commit -m "Update image tag to ${{ needs.build-and-push.outputs.tag }}" || echo "No changes"

          git push



